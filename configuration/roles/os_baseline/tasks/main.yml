---
# 1. Kernel Preparation (Required for K8s networking)
- name: OS Baseline - Configure Kernel Modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
  tags: [kernel, k8s_prep]

- name: OS Baseline - Configure Sysctl Settings
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: 'vm.swappiness', value: "{{ baseline_swappiness }}" }
    - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { name: 'net.ipv4.ip_forward', value: '1' }
  tags: [sysctl, network]

# 2. Package Installation (Triggers debian.yml or redhat.yml)
- name: Load OS specific tasks
  ansible.builtin.include_tasks: "{{ ansible_os_family | lower }}.yml"
  tags: [packages]

# 3. Python Environment Setup (Fixes the ArgoCD/K8s module error)
- name: OS Baseline - Install Kubernetes Python Libraries
  ansible.builtin.pip:
    name: 
      - kubernetes
      - pyyaml
      - jsonpatch
    state: present
  tags: [python, k8s_mgmt]

# 4. Final Verifications
- name: Verify baseline configuration
  ansible.builtin.command: "{{ item }}"
  register: verify_output
  changed_when: false
  loop:
    - "sysctl vm.swappiness"
    - "git --version"
    - "pip3 --version"
  tags: [debug]

- name: Print verification results
  ansible.builtin.debug:
    msg: "{{ item.stdout }}"
  loop: "{{ verify_output.results }}"
  tags: [debug]
